<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Crisis Route Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet Routing Machine — sends real GPS coords to OSRM, gets actual road geometry back -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<style>
:root{
  --bg:#070a0e; --surf:#0c0f15; --s2:#111620; --brd:#1b2333; --b2:#253047;
  --amb:#38bdf8; --amb-bg:rgba(56,189,248,.1);
  --res:#4ade80; --res-bg:rgba(74,222,128,.1);
  --boa:#f97316; --boa-bg:rgba(249,115,22,.1);
  --red:#ef4444; --amber:#f59e0b; --muted:#475569; --dim:#94a3b8; --txt:#e2e8f0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;
  height:100vh;display:grid;grid-template-rows:52px 1fr;grid-template-columns:370px 1fr;overflow:hidden}

/* HEADER */
header{grid-column:1/-1;background:var(--surf);border-bottom:1px solid var(--brd);
  display:flex;align-items:center;padding:0 16px;gap:12px}
.logo{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:3px;color:var(--red);text-transform:uppercase;white-space:nowrap}
.logo em{color:var(--txt);font-style:normal}
.live{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(74,222,128,.5)}
  50%{opacity:.7;box-shadow:0 0 0 7px rgba(74,222,128,0)}}
.tabs{display:flex;gap:2px;margin-left:10px}
.tab{padding:4px 13px;font-family:'JetBrains Mono',monospace;font-size:10px;
  font-weight:700;letter-spacing:1px;background:transparent;border:1px solid var(--brd);
  color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase}
.tab:hover{border-color:var(--b2);color:var(--dim)}
.tab.on{background:var(--red);border-color:var(--red);color:#fff}
.stats{display:flex;margin-left:auto}
.st{display:flex;flex-direction:column;align-items:flex-end;padding:0 14px;
  border-left:1px solid var(--brd)}
.st:last-child{padding-right:0}
.sv{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;line-height:1}
.sl{font-size:8px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:3px}

/* SIDEBAR */
aside{background:var(--surf);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.city-blk{padding:14px 16px 12px;border-bottom:1px solid var(--brd);background:var(--s2)}
.c-tag{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.c-name{font-size:20px;font-weight:700;margin-top:2px;line-height:1}
.c-coord{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px}

/* OSRM status */
.osrm{display:flex;align-items:center;gap:7px;padding:6px 14px;
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.5px;
  border-bottom:1px solid var(--brd);background:var(--bg);transition:color .3s}
.osrm.wait{color:var(--amber)}.osrm.ok{color:var(--res)}.osrm.fail{color:var(--red)}
.spin{animation:rot .7s linear infinite;display:inline-block}
@keyframes rot{to{transform:rotate(360deg)}}

/* LEGEND — clickable type filter */
.leg-row{display:flex;border-bottom:1px solid var(--brd);flex-shrink:0}
.leg{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 4px;font-size:10px;font-weight:700;letter-spacing:.3px;
  border-right:1px solid var(--brd);cursor:pointer;transition:background .12s;
  user-select:none;position:relative}
.leg:last-child{border-right:none}
.leg.off{opacity:.3}
.leg:hover{background:rgba(255,255,255,.03)}
.leg-ic{font-size:15px}
.leg-ln{width:22px;height:3px;border-radius:2px}
.leg-cnt{position:absolute;top:3px;right:5px;
  font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted)}

/* ROUTE LIST */
.rlist{flex:1;overflow-y:auto;padding:8px 10px}
.rlist::-webkit-scrollbar{width:3px}
.rlist::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}

.z-hdr{display:flex;align-items:center;gap:8px;margin:8px 2px 4px}
.z-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:3px;background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.3);color:var(--red)}
.z-rule{flex:1;height:1px;background:var(--brd)}

/* Route card */
.rc{display:flex;gap:0;border-bottom:1px solid var(--brd);cursor:pointer;
  transition:background .12s;border-radius:3px;overflow:hidden;margin-bottom:3px}
.rc:hover{background:rgba(255,255,255,.03)}
.rc.on{background:rgba(255,255,255,.05)}
.rc-bar{width:4px;flex-shrink:0}
.rc-body{flex:1;padding:9px 10px;min-width:0}
.rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rc-type{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700}
.rc-ic{font-size:15px}
.rc-n{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700}
.rc-st{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;
  border-radius:2px;letter-spacing:.5px}
.rc-st.w{background:rgba(245,158,11,.12);color:var(--amber)}
.rc-st.ok{background:rgba(74,222,128,.12);color:var(--res)}
.rc-st.fail{background:rgba(239,68,68,.12);color:var(--red)}

/* Metric grid */
.rc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;
  background:var(--s2);border-radius:3px;overflow:hidden;margin-bottom:5px;border:1px solid var(--brd)}
.rcg{display:flex;flex-direction:column;align-items:center;padding:5px 4px;
  border-right:1px solid var(--brd)}
.rcg:last-child{border-right:none}
.rcgv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;line-height:1}
.rcgl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.rc-from{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-from b{color:var(--dim);font-weight:500}

/* MAP */
#map{background:#070a0e}
.leaflet-tile-pane{filter:brightness(.58) saturate(.3) hue-rotate(198deg)}
.leaflet-routing-container,.leaflet-routing-alt{display:none!important}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom a{background:var(--surf)!important;border-color:var(--brd)!important;color:var(--txt)!important}

/* Map markers */
.zm{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  padding:3px 8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.55);
  color:var(--red);white-space:nowrap;backdrop-filter:blur(4px)}
.bm{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;
  white-space:nowrap;background:rgba(7,10,14,.9);border:1px solid;backdrop-filter:blur(4px)}

/* DETAIL PANEL */
#det{position:absolute;bottom:16px;right:16px;width:268px;
  background:var(--surf);border:1px solid var(--brd);z-index:1200;display:none}
#det.on{display:block;animation:up .18s ease}
@keyframes up{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.d-hd{padding:10px 12px;border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between}
.d-ti{font-size:12px;font-weight:700}
.d-cl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer}
.d-cl:hover{color:var(--txt)}
.d-bd{padding:10px 12px}
.d-row{display:flex;justify-content:space-between;padding:4px 0;font-size:10px;border-bottom:1px solid var(--brd)}
.d-row:last-child{border:none}
.dk{color:var(--muted)}.dv{font-family:'JetBrains Mono',monospace;font-weight:700}

/* OSRM info bar on map */
#info-bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);
  z-index:1100;background:var(--surf);border:1px solid var(--b2);
  padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--dim);white-space:nowrap;display:flex;align-items:center;gap:8px;pointer-events:none}
.i-dot{width:6px;height:6px;border-radius:50%;background:var(--res);flex-shrink:0}

/* Map controls */
.mctrl{position:absolute;top:62px;right:8px;z-index:900;display:flex;flex-direction:column;gap:3px}
.mc{background:var(--surf);border:1px solid var(--brd);color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.8px;
  padding:5px 9px;cursor:pointer;text-transform:uppercase;transition:all .12s}
.mc:hover,.mc.on{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--txt)}
.rtip{background:var(--surf);border:1px solid var(--brd);
  font-family:'JetBrains Mono',monospace;font-size:9px;padding:5px 9px;color:var(--txt);white-space:nowrap}
</style>
</head>
<body>
<header>
  <div class="logo">CRISIS<em>MGT</em></div>
  <div class="live"></div>
  <div class="tabs" id="tabs"></div>
  <div class="stats">
    <div class="st"><div class="sv" id="hR" style="color:var(--amb)">—</div><div class="sl">Routes</div></div>
    <div class="st"><div class="sv" id="hU" style="color:var(--res)">—</div><div class="sl">Units</div></div>
    <div class="st"><div class="sv" id="hD" style="color:var(--amber)">—</div><div class="sl">Road km</div></div>
    <div class="st"><div class="sv" id="hE" style="color:var(--boa)">—</div><div class="sl">Max ETA</div></div>
  </div>
</header>

<aside>
  <div class="city-blk">
    <div class="c-tag">Active Operation</div>
    <div class="c-name" id="cName">—</div>
    <div class="c-coord" id="cCoord">—</div>
  </div>
  <div class="osrm wait" id="osrmBar">
    <span class="spin" id="osrmIc">◌</span>
    <span id="osrmMsg">Connecting to OSRM…</span>
  </div>
  <!-- Clickable legend / type filter -->
  <div class="leg-row">
    <div class="leg" id="la" onclick="toggleType('amb')">
      <span class="leg-ic">🚑</span>
      <div class="leg-ln" style="background:var(--amb)"></div>
      <span style="color:var(--amb)">Ambulance</span>
      <span class="leg-cnt" id="cnt-amb">—</span>
    </div>
    <div class="leg" id="lr" onclick="toggleType('res')">
      <span class="leg-ic">🛟</span>
      <div class="leg-ln" style="background:var(--res);border-top:2px dashed var(--res);height:0;margin-top:1px"></div>
      <span style="color:var(--res)">Rescue</span>
      <span class="leg-cnt" id="cnt-res">—</span>
    </div>
    <div class="leg" id="lb" onclick="toggleType('boa')">
      <span class="leg-ic">🚤</span>
      <div class="leg-ln" style="background:var(--boa);border-top:2px dotted var(--boa);height:0;margin-top:1px"></div>
      <span style="color:var(--boa)">Boat</span>
      <span class="leg-cnt" id="cnt-boa">—</span>
    </div>
  </div>
  <div class="rlist" id="rlist"></div>
</aside>

<div id="map">
  <div id="info-bar">
    <div class="i-dot"></div>
    <span>Real road paths via OSRM · OpenStreetMap data · No API key needed</span>
  </div>
</div>
<div class="mctrl">
  <button class="mc on" id="mcR" onclick="togLayer('R')">Routes</button>
  <button class="mc on" id="mcZ" onclick="togLayer('Z')">Zones</button>
  <button class="mc on" id="mcB" onclick="togLayer('B')">Bases</button>
</div>
<div id="det">
  <div class="d-hd">
    <div class="d-ti" id="dTi">—</div>
    <span class="d-cl" onclick="closeDet()">✕ close</span>
  </div>
  <div class="d-bd" id="dBd"></div>
</div>

Object.keys(DATA).forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='tab'+(i===0?' on':'');
  b.textContent=c;b.onclick=()=>switchCity(c);
  tabsEl.appendChild(b);
});

/* ── SWITCH CITY ───────────────────────────────────────────────── */
function switchCity(c){
  city=c;activeIdx=null;closeDet();
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.textContent===c));
  const d=DATA[c];
  document.getElementById('cName').textContent=c;
  document.getElementById('cCoord').textContent=d.meta.center_lat.toFixed(4)+'°N  '+d.meta.center_lon.toFixed(4)+'°E';
  // reset type vis
  typeVis={amb:true,res:true,boa:true};
  ['la','lr','lb'].forEach(id=>document.getElementById(id)?.classList.remove('off'));
  updateLegendCounts(d);
  renderSidebar(d);
  renderMap(d);
  updateStats(d);
}

/* ── LEGEND COUNTS ──────────────────────────────────────────────── */
function updateLegendCounts(d){
  const counts={amb:0,res:0,boa:0};
  d.routes.forEach(r=>{const k=rc(r.resource_type).key; if(counts[k]!==undefined) counts[k]+=r.unit_count;});
  ['amb','res','boa'].forEach(k=>{
    const el=document.getElementById('cnt-'+k);
    if(el) el.textContent=counts[k]||'—';
  });
}

/* ── SIDEBAR ────────────────────────────────────────────────────── */
function renderSidebar(d){
  const el=document.getElementById('rlist');el.innerHTML='';
  const byZone={};
  d.routes.forEach((r,i)=>{if(!byZone[r.zone])byZone[r.zone]=[];byZone[r.zone].push({...r,_i:i});});

  Object.entries(byZone).forEach(([zone,routes])=>{
    const zh=document.createElement('div');zh.className='z-hdr';
    zh.innerHTML=`<span class="z-badge">⚠ ${zone}</span><div class="z-rule"></div>`;
    el.appendChild(zh);

    routes.forEach(r=>{
      const cf=rc(r.resource_type);
      const card=document.createElement('div');
      card.className='rc';card.id='card-'+r._i;
      if(!typeVis[cf.key]) card.style.display='none';
      card.innerHTML=`
        <div class="rc-bar" style="background:${cf.c}"></div>
        <div class="rc-body">
          <div class="rc-top">
            <div class="rc-type">
              <span class="rc-ic">${cf.ic}</span>
              <span style="color:${cf.c}">${cf.la}</span>
              <span class="rc-n" style="background:${cf.bg};color:${cf.c}">×${r.unit_count}</span>
            </div>
            <span class="rc-st w" id="st-${r._i}">ROUTING…</span>
          </div>
          <div class="rc-grid">
            <div class="rcg">
              <span class="rcgv" style="color:${cf.c}" id="di-${r._i}">${r.distance_km}</span>
              <span class="rcgl">km</span>
            </div>
            <div class="rcg">
              <span class="rcgv" style="color:var(--amber)" id="et-${r._i}">${r.eta_minutes}</span>
              <span class="rcgl">min</span>
            </div>
            <div class="rcg">
              <span class="rcgv" id="pt-${r._i}">…</span>
              <span class="rcgl">road pts</span>
            </div>
          </div>
          <div class="rc-from">from <b>${r.origin_name}</b></div>
        </div>`;
      card.onclick=()=>focusRoute(r._i);
      el.appendChild(card);
    });
  });
}

/* ── RENDER MAP ─────────────────────────────────────────────────────────────
   WHY OSRM AND NOT SYNTHETIC GRAPH:

   The Python route_agent uses a 9-node synthetic graph for Dijkstra. Those
   9 nodes are imaginary intersections — there is no real road geometry between
   them. Leaflet draws straight lines between the returned lat/lon points because
   those ARE the only points we have.

   Solution: We have the REAL origin GPS (hospital/depot) and destination GPS
   (zone centre on actual map). Leaflet Routing Machine sends those two points
   to OSRM (router.project-osrm.org) — OpenStreetMap's own routing engine.
   OSRM returns the actual road path with hundreds of intermediate coordinate
   points following real streets. That is what gets drawn.

   When osmnx is installed (now added to requirements.txt), the Python
   route_agent with use_real_osm=True will ALSO use the same OpenStreetMap
   road data for Dijkstra — giving consistent results between Python routing
   and the HTML visualisation.
──────────────────────────────────────────────────────────────────────────── */
function renderMap(d){
  rCtrls.forEach(c=>{try{map.removeControl(c);}catch(e){}});
  rCtrls=[];rLayers={};
  LR.clearLayers();LZ.clearLayers();LB.clearLayers();

  done=0;needed=d.routes.length;
  setOsrm('wait','Fetching '+needed+' road routes from OSRM…');

  /* Crisis zones */
  d.zones_affected.forEach(z=>{
    const co=d.zone_coords[z];if(!co)return;
    L.circle(co,{radius:220,color:'#ef4444',fillColor:'rgba(239,68,68,.08)',fillOpacity:1,weight:1.5,dashArray:'6 4'}).addTo(LZ);
    L.marker(co,{icon:L.divIcon({className:'',html:`<div class="zm">⚠ ${z}</div>`,iconAnchor:[24,-6]})}).addTo(LZ);
  });

  /* Base locations — coloured by resource type */
  d.bases.forEach(b=>{
    const cf=rc(b.type);
    L.circleMarker([b.lat,b.lon],{radius:9,color:cf.c,fillColor:cf.bg,fillOpacity:1,weight:2}).addTo(LB)
     .bindTooltip(`<div class="rtip">${cf.ic} ${b.name}</div>`,{className:''});
    L.marker([b.lat,b.lon],{icon:L.divIcon({className:'',
      html:`<div class="bm" style="border-color:${cf.c};color:${cf.c}">${cf.ic} ${b.name}</div>`,iconAnchor:[0,-8]})}).addTo(LB);
  });

  /* Fit map */
  const pts=d.routes.flatMap(r=>[[r.origin_lat,r.origin_lon],[r.dest_lat,r.dest_lon]]);
  if(pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.22));

  /* ROUTE EACH ASSIGNMENT VIA OSRM */
  d.routes.forEach((r,i)=>{
    const cf=rc(r.resource_type);

    const ctrl=L.Routing.control({
      waypoints:[L.latLng(r.origin_lat,r.origin_lon),L.latLng(r.dest_lat,r.dest_lon)],
      router:L.Routing.osrmv1({serviceUrl:'https://router.project-osrm.org/route/v1',profile:'driving'}),
      createMarker:()=>null,addWaypoints:false,fitSelectedRoutes:false,showAlternatives:false,
      lineOptions:{
        styles:[{color:cf.c,weight:cf.w,opacity:.88,dashArray:cf.d||undefined}],
        addWaypoints:false,
      },
    });

    /* OSRM success — real road data arrived */
    ctrl.on('routesfound',e=>{
      const rt=e.routes[0];const sm=rt.summary;
      const dk=(sm.totalDistance/1000).toFixed(2);
      const em=(sm.totalTime/60).toFixed(1);
      const pp=rt.coordinates.length;
      const g=id=>document.getElementById(id+'-'+i);
      if(g('di')) g('di').textContent=dk;
      if(g('et')) g('et').textContent=em;
      if(g('pt')) g('pt').textContent=pp;
      const st=document.getElementById('st-'+i);
      if(st){st.textContent='ROUTED';st.className='rc-st ok';}
      r._road={dk,em,pp,turns:rt.instructions?.length||'—'};
      done++;
      updateStatsRoad();
      if(done>=needed) setOsrm('ok','All '+done+' routes on real roads ✓');
    });

    /* OSRM failure — fallback dashed direct line */
    ctrl.on('routingerror',()=>{
      const st=document.getElementById('st-'+i);
      if(st){st.textContent='OFFLINE';st.className='rc-st fail';}
      const fb=L.polyline([[r.origin_lat,r.origin_lon],[r.dest_lat,r.dest_lon]],
        {color:cf.c,weight:2,opacity:.35,dashArray:'6 6'}).addTo(LR);
      fb.bindTooltip(`<div class="rtip">${cf.ic} OSRM offline — direct line</div>`,{className:''});
      fb.on('click',()=>focusRoute(i));rLayers[i]=fb;
      done++;if(done>=needed) setOsrm('fail','OSRM unavailable — direct lines shown');
    });

    ctrl.addTo(map);rCtrls.push(ctrl);

    /* Capture LRM polyline, attach handlers */
    setTimeout(()=>{
      map.eachLayer(l=>{
        if(l instanceof L.Polyline&&!l._t&&l!==map){
          const lc=(l.options.color||'').toLowerCase();
          if(lc===cf.c.toLowerCase()){
            l._t=true;l._ri=i;rLayers[i]=l;
            l.on('click',()=>focusRoute(i));
            l.on('mouseover',()=>l.setStyle({weight:cf.w+2,opacity:1}));
            l.on('mouseout',()=>{
              l.setStyle({weight:activeIdx===i?cf.w+2:cf.w,opacity:activeIdx===i?1:.88});
            });
          }
        }
      });
    },1400);
  });

  /* Origin + destination markers */
  d.routes.forEach((r,i)=>{
    const cf=rc(r.resource_type);
    L.circleMarker([r.origin_lat,r.origin_lon],{radius:7,color:cf.c,fillColor:'#070a0e',fillOpacity:1,weight:2.5})
     .addTo(LR).on('click',()=>focusRoute(i))
     .bindTooltip(`<div class="rtip">${cf.ic} Base: ${r.origin_name}</div>`,{className:''});
    L.circleMarker([r.dest_lat,r.dest_lon],{radius:5,color:cf.c,fillColor:cf.c,fillOpacity:.35,weight:2})
     .addTo(LR).on('click',()=>focusRoute(i));
  });
}

/* ── FOCUS ROUTE ────────────────────────────────────────────────── */
function focusRoute(i){
  activeIdx=i;
  const r=DATA[city]?.routes[i];if(!r)return;
  const cf=rc(r.resource_type);
  document.querySelectorAll('.rc').forEach(c=>c.classList.remove('on'));
  const card=document.getElementById('card-'+i);
  if(card){card.classList.add('on');card.scrollIntoView({block:'nearest',behavior:'smooth'});}
  map.flyToBounds(L.latLngBounds([r.origin_lat,r.origin_lon],[r.dest_lat,r.dest_lon]).pad(.35),{duration:.7});

  const road=r._road;
  document.getElementById('dTi').innerHTML=`${cf.ic} <span style="color:${cf.c}">${cf.la}</span> → ${r.zone}`;
  const rows=[
    ['Base',r.origin_name],['Units',r.unit_count+'×'],
    ['Road dist',road?road.dk+' km':'loading…'],
    ['Road ETA',road?road.em+' min':'loading…'],
    ['Road waypts',road?road.pp:'loading…'],
    ['Turns',road?road.turns:'loading…'],
    ['Zone GPS',r.dest_lat.toFixed(5)+', '+r.dest_lon.toFixed(5)],
  ];
  document.getElementById('dBd').innerHTML=rows.map(([k,v])=>
    `<div class="d-row"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join('');
  document.getElementById('det').classList.add('on');
}

/* ── TOGGLE TYPE (legend click) ─────────────────────────────────── */
const TYPE_MAP={amb:['ambulances','ambulance'],res:['rescue_teams','rescue_team'],boa:['boats','boat']};
const LEG_EL={amb:'la',res:'lr',boa:'lb'};
function toggleType(k){
  typeVis[k]=!typeVis[k];
  document.getElementById(LEG_EL[k])?.classList.toggle('off',!typeVis[k]);
  DATA[city]?.routes.forEach((r,i)=>{
    if(!TYPE_MAP[k]?.includes(r.resource_type)) return;
    const card=document.getElementById('card-'+i);
    if(card) card.style.display=typeVis[k]?'':'none';
    const l=rLayers[i];
    if(l&&l.setStyle) l.setStyle({opacity:typeVis[k]?.88:0});
  });
}

/* ── LAYER TOGGLES ──────────────────────────────────────────────── */
function togLayer(n){
  layVis[n]=!layVis[n];
  document.getElementById('mc'+n)?.classList.toggle('on',layVis[n]);
  const lg={R:LR,Z:LZ,B:LB};
  if(layVis[n]) map.addLayer(lg[n]); else map.removeLayer(lg[n]);
  if(n==='R') rCtrls.forEach(c=>{try{if(layVis[n])c.addTo(map);else map.removeControl(c);}catch(e){}});
}

/* ── STATS ──────────────────────────────────────────────────────── */
function updateStats(d){
  const rs=d.routes.filter(r=>r.success);
  document.getElementById('hR').textContent=rs.length;
  document.getElementById('hU').textContent=rs.reduce((s,r)=>s+r.unit_count,0);
  document.getElementById('hD').textContent='—';
  document.getElementById('hE').textContent='—';
}
function updateStatsRoad(){
  const rs=DATA[city]?.routes.filter(r=>r._road);if(!rs?.length)return;
  document.getElementById('hD').textContent=rs.reduce((s,r)=>s+parseFloat(r._road.dk||0),0).toFixed(1)+' km';
  document.getElementById('hE').textContent=Math.max(...rs.map(r=>parseFloat(r._road.em||0))).toFixed(1)+' min';
}

/* ── OSRM BAR ───────────────────────────────────────────────────── */
function setOsrm(s,m){
  const bar=document.getElementById('osrmBar');
  bar.className='osrm '+s;
  const ic=document.getElementById('osrmIc');
  ic.className=s==='wait'?'spin':'';
  ic.textContent=s==='wait'?'◌':s==='ok'?'✓':'✗';
  document.getElementById('osrmMsg').textContent=m;
}
function closeDet(){
  document.getElementById('det').classList.remove('on');
  document.querySelectorAll('.rc').forEach(c=>c.classList.remove('on'));
  activeIdx=null;
}

/* ── BOOT ───────────────────────────────────────────────────────── */
switchCity(Object.keys(DATA)[0]);
</script>
