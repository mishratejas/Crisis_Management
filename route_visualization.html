<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crisis Route Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:       #0a0c10;
  --panel:    #0f1218;
  --border:   #1e2530;
  --accent:   #ff4444;
  --amber:    #f5a623;
  --cyan:     #00d4ff;
  --green:    #00ff88;
  --purple:   #9b59ff;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --ambulance:#00d4ff;
  --rescue:   #00ff88;
  --boat:     #9b59ff;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  height: 100vh;
  display: grid;
  grid-template-rows: 52px 1fr;
  grid-template-columns: 340px 1fr;
  overflow: hidden;
}

/* ── TOP BAR ── */
header {
  grid-column: 1 / -1;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  position: relative;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
}
.logo span { color: var(--text); }
.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
  50%      { opacity:.7; box-shadow: 0 0 0 6px rgba(0,255,136,0); }
}
.header-stats {
  display: flex;
  gap: 24px;
  margin-left: auto;
}
.hstat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.hstat-val {
  font-family: 'Space Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
}
.hstat-lbl {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 2px;
}
.city-tabs {
  display: flex;
  gap: 2px;
  margin-left: 16px;
}
.city-tab {
  padding: 6px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.city-tab:hover { border-color: var(--accent); color: var(--text); }
.city-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── SIDEBAR ── */
aside {
  grid-row: 2;
  grid-column: 1;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-title {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.city-name {
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
}
.city-coords {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── ROUTE LIST ── */
.route-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.route-list::-webkit-scrollbar { width: 4px; }
.route-list::-webkit-scrollbar-track { background: transparent; }
.route-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.zone-group { margin-bottom: 14px; }
.zone-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  padding: 0 6px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.zone-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.zone-tag {
  font-size: 9px;
  padding: 2px 6px;
  background: rgba(255,68,68,.15);
  border: 1px solid rgba(255,68,68,.3);
  color: var(--accent);
  border-radius: 2px;
}

.route-card {
  background: rgba(255,255,255,.02);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  padding: 10px 12px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  overflow: hidden;
}
.route-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.015));
  opacity: 0;
  transition: opacity .15s;
}
.route-card:hover { border-color: var(--border); background: rgba(255,255,255,.04); }
.route-card:hover::before { opacity: 1; }
.route-card.active { background: rgba(255,255,255,.06); }
.route-card.type-ambulances  { border-left-color: var(--ambulance); }
.route-card.type-ambulance   { border-left-color: var(--ambulance); }
.route-card.type-rescue_teams{ border-left-color: var(--rescue); }
.route-card.type-rescue_team { border-left-color: var(--rescue); }
.route-card.type-boats       { border-left-color: var(--boat); }
.route-card.type-boat        { border-left-color: var(--boat); }

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.resource-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
}
.resource-icon { font-size: 14px; }
.unit-count {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 2px;
  color: #fff;
}
.route-meta {
  display: flex;
  gap: 12px;
}
.meta-item {
  display: flex;
  flex-direction: column;
}
.meta-val {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
}
.meta-lbl {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.route-from {
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 4px;
}
.route-from span { color: var(--text); }

/* ── LEGEND ── */
.legend {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .5px;
}
.leg-line {
  width: 20px;
  height: 2px;
  border-radius: 1px;
}
.leg-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 2px solid;
}

/* ── MAP ── */
#map {
  grid-row: 2;
  grid-column: 2;
  background: #0d1117;
}

/* Leaflet custom styles */
.leaflet-tile-pane { filter: brightness(.7) saturate(.5) hue-rotate(180deg); }
.leaflet-control-attribution { display: none !important; }
.leaflet-control-zoom a {
  background: var(--panel) !important;
  border-color: var(--border) !important;
  color: var(--text) !important;
}

/* Custom markers */
.zone-marker-label {
  background: rgba(255,68,68,.15);
  border: 1px solid rgba(255,68,68,.5);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 7px;
  white-space: nowrap;
  backdrop-filter: blur(4px);
}
.base-marker-label {
  background: rgba(10,12,16,.85);
  border: 1px solid;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  white-space: nowrap;
  backdrop-filter: blur(4px);
}
.waypoint-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  border: 2px solid currentColor;
  background: var(--bg);
}

/* ── DETAIL PANEL (bottom-right overlay) ── */
#detail-panel {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 280px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 16px;
  display: none;
  z-index: 1000;
  font-size: 12px;
}
#detail-panel.visible { display: block; animation: slideUp .2s ease; }
@keyframes slideUp {
  from { transform: translateY(10px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.detail-close {
  position: absolute;
  top: 10px; right: 12px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
}
.detail-close:hover { color: var(--text); }
.detail-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  padding-right: 20px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.detail-row:last-child { border: none; }
.detail-key { color: var(--muted); }
.detail-val { font-family: 'Space Mono', monospace; font-weight: 700; }

/* ── GRID OVERLAY toggle ── */
.map-controls {
  position: absolute;
  top: 70px;
  right: 10px;
  z-index: 900;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.map-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 6px 10px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all .15s;
}
.map-btn:hover, .map-btn.active {
  background: rgba(255,68,68,.1);
  border-color: var(--accent);
  color: var(--text);
}
</style>
</head>
<body>

<header>
  <div class="logo">CRISIS<span>MGT</span></div>
  <div class="pulse-dot"></div>
  <div class="city-tabs" id="cityTabs"></div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="hTotalRoutes" style="color:var(--cyan)">0</div>
      <div class="hstat-lbl">Routes</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hTotalDist" style="color:var(--amber)">0</div>
      <div class="hstat-lbl">Total km</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hTotalUnits" style="color:var(--green)">0</div>
      <div class="hstat-lbl">Units</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hMaxETA" style="color:var(--purple)">0</div>
      <div class="hstat-lbl">Max ETA min</div>
    </div>
  </div>
</header>

<aside>
  <div class="sidebar-header">
    <div class="sidebar-title">Active City</div>
    <div class="city-name" id="sidebarCityName">—</div>
    <div class="city-coords" id="sidebarCoords">—</div>
  </div>
  <div class="route-list" id="routeList"></div>
  <div class="legend">
    <div class="leg-item"><div class="leg-line" style="background:var(--ambulance)"></div> Ambulance</div>
    <div class="leg-item"><div class="leg-line" style="background:var(--rescue)"></div> Rescue Team</div>
    <div class="leg-item"><div class="leg-line" style="background:var(--boat)"></div> Boat</div>
    <div class="leg-item"><div class="leg-dot" style="border-color:var(--accent)"></div> Crisis Zone</div>
    <div class="leg-item"><div class="leg-dot" style="border-color:var(--amber)"></div> Base</div>
  </div>
</aside>

<div id="map"></div>

<div class="map-controls">
  <button class="map-btn" id="btnGrid" onclick="toggleGrid()">Grid</button>
  <button class="map-btn active" id="btnRoutes" onclick="toggleRoutes()">Routes</button>
  <button class="map-btn active" id="btnZones" onclick="toggleZones()">Zones</button>
  <button class="map-btn active" id="btnBases" onclick="toggleBases()">Bases</button>
</div>

<div id="detail-panel">
  <span class="detail-close" onclick="closeDetail()">✕ CLOSE</span>
  <div class="detail-title" id="detailTitle"></div>
  <div id="detailRows"></div>
</div>

// ── CONFIG ──────────────────────────────────────────────────────────────────
const RESOURCE_CONFIG = {
  ambulances:   { color: '#00d4ff', icon: '🚑', label: 'Ambulance'   },
  ambulance:    { color: '#00d4ff', icon: '🚑', label: 'Ambulance'   },
  rescue_teams: { color: '#00ff88', icon: '🛟', label: 'Rescue Team' },
  rescue_team:  { color: '#00ff88', icon: '🛟', label: 'Rescue Team' },
  boats:        { color: '#9b59ff', icon: '🚤', label: 'Boat'        },
  boat:         { color: '#9b59ff', icon: '🚤', label: 'Boat'        },
};

function rcfg(type) {
  return RESOURCE_CONFIG[type] || { color:'#aaa', icon:'📦', label: type };
}

// ── MAP INIT ─────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true, attributionControl: false });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// Layer groups
const layerRoutes = L.layerGroup().addTo(map);
const layerZones  = L.layerGroup().addTo(map);
const layerBases  = L.layerGroup().addTo(map);
const layerGrid   = L.layerGroup();   // not added by default

let currentCity = null;
let activeCardIdx = null;
let showRoutes = true, showZones = true, showBases = true, showGrid = false;

// ── CITY TABS ────────────────────────────────────────────────────────────────
const tabsEl = document.getElementById('cityTabs');
Object.keys(ROUTE_DATA).forEach((city, i) => {
  const btn = document.createElement('button');
  btn.className = 'city-tab' + (i === 0 ? ' active' : '');
  btn.textContent = city;
  btn.onclick = () => switchCity(city);
  tabsEl.appendChild(btn);
});

// ── SWITCH CITY ──────────────────────────────────────────────────────────────
function switchCity(city) {
  currentCity = city;
  activeCardIdx = null;
  closeDetail();

  // update tabs
  document.querySelectorAll('.city-tab').forEach(b => {
    b.classList.toggle('active', b.textContent === city);
  });

  const d = ROUTE_DATA[city];
  renderSidebar(city, d);
  renderMap(city, d);
  updateHeaderStats(d);
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar(city, d) {
  document.getElementById('sidebarCityName').textContent = city;
  document.getElementById('sidebarCoords').textContent =
    d.meta.center_lat.toFixed(4) + '°N  ' + d.meta.center_lon.toFixed(4) + '°E';

  const listEl = document.getElementById('routeList');
  listEl.innerHTML = '';

  // Group routes by zone
  const byZone = {};
  d.routes.forEach((r, i) => {
    if (!byZone[r.zone]) byZone[r.zone] = [];
    byZone[r.zone].push({ ...r, _idx: i });
  });

  Object.entries(byZone).forEach(([zone, routes]) => {
    const grp = document.createElement('div');
    grp.className = 'zone-group';
    grp.innerHTML = `<div class="zone-label"><span class="zone-tag">${zone}</span> CRISIS ZONE</div>`;

    routes.forEach(r => {
      const cfg = rcfg(r.resource_type);
      const card = document.createElement('div');
      card.className = `route-card type-${r.resource_type}`;
      card.dataset.idx = r._idx;
      card.innerHTML = `
        <div class="card-top">
          <div class="resource-badge">
            <span class="resource-icon">${cfg.icon}</span>
            <span style="color:${cfg.color}">${cfg.label}</span>
            <span class="unit-count" style="background:${cfg.color}33;color:${cfg.color}">×${r.unit_count}</span>
          </div>
        </div>
        <div class="route-meta">
          <div class="meta-item">
            <span class="meta-val" style="color:${cfg.color}">${r.distance_km}</span>
            <span class="meta-lbl">km</span>
          </div>
          <div class="meta-item">
            <span class="meta-val" style="color:var(--amber)">${r.eta_minutes}</span>
            <span class="meta-lbl">min ETA</span>
          </div>
          <div class="meta-item">
            <span class="meta-val">${r.waypoints.length}</span>
            <span class="meta-lbl">stops</span>
          </div>
        </div>
        <div class="route-from">from <span>${r.origin}</span></div>
      `;
      card.onclick = () => focusRoute(r._idx);
      grp.appendChild(card);
    });

    listEl.appendChild(grp);
  });
}

// ── MAP RENDER ───────────────────────────────────────────────────────────────
function renderMap(city, d) {
  layerRoutes.clearLayers();
  layerZones.clearLayers();
  layerBases.clearLayers();
  layerGrid.clearLayers();

  const bounds = [];

  // ── Draw routes ────────────────────────────────────────────────
  d.routes.forEach((r, i) => {
    if (!r.success || r.waypoints.length < 2) return;
    const cfg = rcfg(r.resource_type);

    const coords = r.waypoints; // already [lat,lon]

    // animated-ish dashed polyline
    const line = L.polyline(coords, {
      color: cfg.color,
      weight: 2.5,
      opacity: 0.75,
      dashArray: '6 4',
      lineJoin: 'round',
    }).addTo(layerRoutes);

    line.on('click', () => focusRoute(i));
    line.on('mouseover', () => line.setStyle({ weight: 4, opacity: 1 }));
    line.on('mouseout',  () => {
      if (activeCardIdx !== i) line.setStyle({ weight: 2.5, opacity: 0.75 });
    });

    coords.forEach(pt => bounds.push(pt));

    // origin arrow marker (base)
    const orig = r.waypoints[0];
    const arrow = L.circleMarker(orig, {
      radius: 5, color: cfg.color,
      fillColor: '#0a0c10', fillOpacity: 1, weight: 2
    }).addTo(layerRoutes);
    arrow.on('click', () => focusRoute(i));

    // destination flag
    const dest = r.waypoints[r.waypoints.length - 1];
    L.circleMarker(dest, {
      radius: 4, color: cfg.color,
      fillColor: cfg.color, fillOpacity: 0.5, weight: 2
    }).addTo(layerRoutes);
  });

  // ── Draw crisis zones ──────────────────────────────────────────
  const zonesUsed = [...new Set(d.routes.map(r => r.zone))];
  zonesUsed.forEach(zone => {
    const coord = d.zone_coords[zone];
    if (!coord) return;
    const [lat, lon] = coord;

    L.circleMarker([lat, lon], {
      radius: 14,
      color: '#ff4444',
      fillColor: 'rgba(255,68,68,0.12)',
      fillOpacity: 1,
      weight: 2,
      dashArray: '4 3',
    }).addTo(layerZones);

    L.marker([lat, lon], {
      icon: L.divIcon({
        className: '',
        html: `<div class="zone-marker-label">${zone}</div>`,
        iconAnchor: [20, -10],
      })
    }).addTo(layerZones);

    bounds.push([lat, lon]);
  });

  // ── Draw bases ─────────────────────────────────────────────────
  d.bases.forEach(b => {
    const cfg = rcfg(b.type);
    L.circleMarker([b.lat, b.lon], {
      radius: 8,
      color: '#f5a623',
      fillColor: 'rgba(245,166,35,0.15)',
      fillOpacity: 1,
      weight: 2,
    }).addTo(layerBases);

    L.marker([b.lat, b.lon], {
      icon: L.divIcon({
        className: '',
        html: `<div class="base-marker-label" style="border-color:${cfg.color};color:${cfg.color}">${cfg.icon} ${b.name}</div>`,
        iconAnchor: [0, -6],
      })
    }).addTo(layerBases);

    bounds.push([b.lat, b.lon]);
  });

  // ── Draw zone grid (all 100) ───────────────────────────────────
  Object.entries(d.zone_coords).forEach(([zid, coord]) => {
    L.circleMarker(coord, {
      radius: 2, color: 'rgba(255,68,68,0.25)',
      fillColor: 'transparent', weight: 1,
    }).addTo(layerGrid);
  });

  // ── Fit bounds ─────────────────────────────────────────────────
  if (bounds.length > 0) {
    map.fitBounds(L.latLngBounds(bounds).pad(0.15));
  }
}

// ── FOCUS ROUTE ──────────────────────────────────────────────────────────────
function focusRoute(idx) {
  const d = ROUTE_DATA[currentCity];
  const r = d.routes[idx];
  if (!r) return;

  activeCardIdx = idx;

  // highlight card
  document.querySelectorAll('.route-card').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.idx) === idx);
  });

  // fly to route
  if (r.waypoints.length > 0) {
    const latlngs = r.waypoints;
    map.fitBounds(L.latLngBounds(latlngs).pad(0.3));
  }

  // show detail panel
  const cfg = rcfg(r.resource_type);
  document.getElementById('detailTitle').innerHTML =
    `${cfg.icon} <span style="color:${cfg.color}">${cfg.label}</span> → ${r.zone}`;

  const rows = [
    ['From',        r.origin],
    ['Units',       r.unit_count + 'x'],
    ['Distance',    r.distance_km + ' km'],
    ['ETA',         r.eta_minutes + ' min'],
    ['Waypoints',   r.waypoints.length],
    ['Destination', r.destination_latlon.map(v => v.toFixed(5)).join(', ')],
    ['Status',      r.success ? '✓ ROUTED' : '✗ FAILED'],
  ];

  document.getElementById('detailRows').innerHTML = rows.map(([k,v]) =>
    `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`
  ).join('');

  document.getElementById('detail-panel').classList.add('visible');
}

// ── HEADER STATS ─────────────────────────────────────────────────────────────
function updateHeaderStats(d) {
  const routes = d.routes.filter(r => r.success);
  const totalDist = routes.reduce((s,r) => s+r.distance_km, 0);
  const totalUnits = routes.reduce((s,r) => s+r.unit_count, 0);
  const maxETA = routes.reduce((m,r) => Math.max(m, r.eta_minutes), 0);

  document.getElementById('hTotalRoutes').textContent = routes.length;
  document.getElementById('hTotalDist').textContent   = totalDist.toFixed(1);
  document.getElementById('hTotalUnits').textContent  = totalUnits;
  document.getElementById('hMaxETA').textContent      = maxETA.toFixed(1);
}

// ── TOGGLE CONTROLS ──────────────────────────────────────────────────────────
function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('btnGrid').classList.toggle('active', showGrid);
  showGrid ? map.addLayer(layerGrid) : map.removeLayer(layerGrid);
}
function toggleRoutes() {
  showRoutes = !showRoutes;
  document.getElementById('btnRoutes').classList.toggle('active', showRoutes);
  showRoutes ? map.addLayer(layerRoutes) : map.removeLayer(layerRoutes);
}
function toggleZones() {
  showZones = !showZones;
  document.getElementById('btnZones').classList.toggle('active', showZones);
  showZones ? map.addLayer(layerZones) : map.removeLayer(layerZones);
}
function toggleBases() {
  showBases = !showBases;
  document.getElementById('btnBases').classList.toggle('active', showBases);
  showBases ? map.addLayer(layerBases) : map.removeLayer(layerBases);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  activeCardIdx = null;
  document.querySelectorAll('.route-card').forEach(c => c.classList.remove('active'));
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
switchCity(Object.keys(ROUTE_DATA)[0]);
</script>
